<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Rogue-Snake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Background Elements -->
        <div class="grid-bg"></div>
        
        <header>
            <div class="score-board">
                <div class="score-item">Score: <span id="current-score">0</span></div>
                <div class="score-item">High: <span id="high-score">0</span></div>
                <div class="score-item">Lvl: <span id="current-level">1</span></div>
                <div class="score-item">Lives: <span id="current-lives">3</span></div>
            </div>
        </header>

        <!-- Main Canvas -->
        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <!-- UI Overlays -->
        <div id="menu-overlay" class="overlay active">
            <h1 class="glitch" data-text="NEON SNAKE">NEON SNAKE</h1>
            <p>Rogue-Lite Edition</p>
            <button id="start-btn" class="neon-btn">INITIALIZE</button>
            <div class="controls-hint">
                <p>Desktop: Arrow Keys / WASD</p>
                <p>Mobile: Swipe or D-Pad</p>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay hidden">
            <h1 class="red-glow">SYSTEM FAILURE</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn" class="neon-btn red-btn">REBOOT SYSTEM</button>
        </div>

        <div id="mutation-overlay" class="overlay hidden">
            <h2 class="purple-glow">LEVEL UP!</h2>
            <p>Select a Mutation:</p>
            <div class="mutation-cards">
                <div class="mutation-card" id="mutation-1">
                    <h3 id="mut1-title">Speed++</h3>
                    <p id="mut1-desc">Increase base speed by 10%</p>
                </div>
                <div class="mutation-card" id="mutation-2">
                    <h3 id="mut2-title">Shorter Tail</h3>
                    <p id="mut2-desc">Remove 3 segments</p>
                </div>
            </div>
        </div>

        <!-- Mobile Controls (Hidden on larger screens) -->
        <div id="mobile-controls">
            <button class="dpad-btn" id="dpad-up">▲</button>
            <div class="dpad-middle">
                <button class="dpad-btn" id="dpad-left">◀</button>
                <button class="dpad-btn" id="dpad-right">▶</button>
            </div>
            <button class="dpad-btn" id="dpad-down">▼</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
